<!DOCTYPE html>
<html>
<head><title>Generate Milky Way Texture</title></head>
<body>
<canvas id="canvas" width="2048" height="1024"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 深空背景
const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
gradient.addColorStop(0, '#000011');
gradient.addColorStop(0.5, '#0a0a2e');
gradient.addColorStop(1, '#000011');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, canvas.width, canvas.height);

// 银河带
ctx.save();
ctx.translate(canvas.width/2, canvas.height/2);
ctx.rotate(-0.3);

for (let i = 0; i < 5000; i++) {
  const x = (Math.random() - 0.5) * canvas.width * 2;
  const y = (Math.random() - 0.5) * canvas.height * 0.4;
  const alpha = Math.random() * 0.3;
  const size = Math.random() * 2 + 0.5;
  
  const colors = ['#4a2080', '#6a30a0', '#8a40c0', '#a060d0', '#c080e0'];
  ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
}

ctx.restore();

// 前景星星
for (let i = 0; i < 2000; i++) {
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height;
  const alpha = Math.random() * 0.8 + 0.2;
  const size = Math.random() * 1.5 + 0.5;
  
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
}

// 导出
canvas.toBlob((blob) => {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'milkyway.jpg';
  a.click();
});
</script>
</body>
</html>
