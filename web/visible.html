<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天理 · 星空</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
      #stars-container { 
        position: fixed; 
        inset: 0; 
        overflow: hidden;
        background: linear-gradient(180deg, 
          #000011 0%, 
          #0a0a2e 30%, 
          #1a0a3e 50%, 
          #0a0a2e 70%, 
          #000011 100%
        );
      }
      /* 银河光晕 */
      #milky-way {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-30deg);
        width: 120%;
        height: 40%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(100, 50, 150, 0.15) 20%,
          rgba(150, 80, 200, 0.2) 50%,
          rgba(100, 50, 150, 0.15) 80%,
          transparent 100%
        );
        filter: blur(40px);
        pointer-events: none;
        z-index: 0;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        background: white;
        animation: twinkle 2s infinite;
      }
      @keyframes twinkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes shooting-star {
        0% {
          transform: translate(0, 0) rotate(-45deg);
          opacity: 1;
        }
        100% {
          transform: translate(-300px, 300px) rotate(-45deg);
          opacity: 0;
        }
      }
      .shooting-star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: linear-gradient(45deg, #fff, transparent);
        border-radius: 50%;
        box-shadow: 0 0 20px 2px rgba(255, 255, 255, 0.8);
        opacity: 0;
      }
      .shooting-star::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100px;
        height: 2px;
        background: linear-gradient(90deg, #fff, transparent);
        transform: translateX(-100%);
      }
      #input-area {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: min(500px, 90vw);
        z-index: 10;
      }
      #input-area input {
        width: 100%;
        padding: 14px 20px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        color: #fff;
        font-size: 16px;
        outline: none;
        backdrop-filter: blur(10px);
      }
      #input-area input::placeholder {
        color: rgba(255,255,255,0.5);
      }
      #drawer {
        position: fixed;
        top: 0;
        right: -100%;
        width: min(400px, 85vw);
        height: 100vh;
        background: #1a1a2e;
        border-left: 1px solid rgba(255,255,255,0.1);
        z-index: 100;
        transition: right 0.3s ease;
        display: flex;
        flex-direction: column;
      }
      #drawer.open { right: 0; }
      .drawer-header {
        padding: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .drawer-header h2 { color: #fff; font-size: 18px; }
      .drawer-header button {
        background: none;
        border: none;
        color: #888;
        font-size: 24px;
        cursor: pointer;
      }
      .drawer-content { flex: 1; overflow-y: auto; padding: 20px; }
      .deliverable {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .deliverable h3 { color: #fff; font-size: 14px; margin-bottom: 8px; }
      .deliverable p { color: #888; font-size: 12px; margin-bottom: 12px; }
      .deliverable button {
        background: #4a90d9;
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 99;
        display: none;
      }
      #overlay.show { display: block; }
      .loading {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #000011 0%, #0a0a2e 100%);
        color: #fff;
        z-index: 1000;
        transition: opacity 0.5s ease;
      }
      .loading.hidden { opacity: 0; pointer-events: none; }
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #4a90d9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text {
        font-size: 16px;
        opacity: 0.8;
        animation: pulse 1.5s ease infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.4; }
      }
      /* 进度提示 */
      #progress-toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: rgba(74, 144, 217, 0.9);
        color: #fff;
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 14px;
        z-index: 500;
        transition: transform 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(10px);
      }
      #progress-toast.show {
        transform: translateX(-50%) translateY(0);
      }
      .progress-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      /* 移动端适配 */
      @media (max-width: 768px) {
        #input-area {
          bottom: 20px;
          width: 95vw;
        }
        #input-area input {
          padding: 12px 16px;
          font-size: 16px;
        }
        #drawer {
          width: 100vw;
          right: -100vw;
        }
        .drawer-header h2 {
          font-size: 16px;
        }
        .deliverable h3 {
          font-size: 13px;
        }
        .deliverable p {
          font-size: 11px;
        }
        .deliverable button {
          padding: 6px 12px;
          font-size: 12px;
        }
        #progress-toast {
          max-width: 90vw;
          padding: 10px 16px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在连接星空...</div>
    </div>
    
    <!-- 星空容器 -->
    <div id="stars-container"></div>
    <!-- 银河背景 -->
    <div id="milky-way"></div>
    
    <!-- 进度提示 -->
    <div id="progress-toast">
      <div class="progress-spinner"></div>
      <span id="progress-text">正在处理...</span>
    </div>
    
    <!-- 输入框 -->
    <div id="input-area">
      <input type="text" id="task-input" placeholder="输入任务..." />
    </div>
    
    <!-- 遮罩层 -->
    <div id="overlay" onclick="closeDrawer()"></div>
    
    <!-- 产物抽屉 -->
    <div id="drawer">
      <div class="drawer-header">
        <h2>✅ 任务完成</h2>
        <button onclick="closeDrawer()">×</button>
      </div>
      <div class="drawer-content" id="deliverables-list"></div>
    </div>
    
    <script>
      // 生成星星
      const container = document.getElementById('stars-container');
      const starCount = 300;
      const colors = ['#ffffff', '#ffe4c4', '#add8e6', '#ffb6c1', '#ffd700'];
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = 3 + Math.random() * 5;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const delay = Math.random() * 2;
        
        star.style.left = x + '%';
        star.style.top = y + '%';
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.background = color;
        star.style.animationDelay = delay + 's';
        star.style.boxShadow = `0 0 ${size * 2}px ${color}`;
        
        container.appendChild(star);
      }
      
      // 流星效果
      function createShootingStar() {
        const meteor = document.createElement('div');
        meteor.className = 'shooting-star';
        
        const startX = 50 + Math.random() * 40;
        const startY = 10 + Math.random() * 30;
        
        meteor.style.left = startX + '%';
        meteor.style.top = startY + '%';
        meteor.style.animation = `shooting-star ${1.5 + Math.random()}s linear`;
        
        container.appendChild(meteor);
        
        setTimeout(() => {
          meteor.remove();
        }, 3000);
      }
      
      function scheduleShootingStar() {
        const delay = 10000 + Math.random() * 20000;
        setTimeout(() => {
          createShootingStar();
          scheduleShootingStar();
        }, delay);
      }
      
      scheduleShootingStar();
      setTimeout(createShootingStar, 3000);
      
      // 隐藏加载动画
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 1500);
      
      // 输入框功能
      const input = document.getElementById('task-input');
      const drawer = document.getElementById('drawer');
      const overlay = document.getElementById('overlay');
      const deliverablesList = document.getElementById('deliverables-list');
      const progressToast = document.getElementById('progress-toast');
      const progressText = document.getElementById('progress-text');
      
      function showProgress(text) {
        progressText.textContent = text;
        progressToast.classList.add('show');
      }
      
      function hideProgress() {
        progressToast.classList.remove('show');
      }
      
      // 发送任务到后端
      async function submitTask(taskText) {
        try {
          const response = await fetch('http://localhost:1420/api/tasks/issue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              task: taskText,
              language: 'zh',
              pinnedHeroId: null,
              collaborationMode: 'primary_consult',
            }),
          });
          
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return await response.json();
        } catch (error) {
          console.error('任务提交失败:', error);
          throw error;
        }
      }
      
      // 获取任务产物
      async function getTaskDeliverables(taskId) {
        try {
          const response = await fetch(`http://localhost:1420/api/deliverables?limit=10`);
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return await response.json();
        } catch (error) {
          console.error('获取产物失败:', error);
          return { items: [] };
        }
      }
      
      input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
          const task = input.value.trim();
          console.log('任务:', task);
          input.value = '';
          
          showProgress('正在分发任务...');
          
          try {
            // 发送到后端
            const result = await submitTask(task);
            console.log('任务已提交:', result);
            
            showProgress('正在执行任务...');
            
            // 等待任务完成（轮询）
            setTimeout(async () => {
              showProgress('正在获取交付物...');
              
              const deliverablesData = await getTaskDeliverables(result.taskId);
              console.log('产物:', deliverablesData);
              
              hideProgress();
              showRealDeliverables(deliverablesData.items || []);
            }, 2000);
            
          } catch (error) {
            hideProgress();
            alert('任务提交失败：' + error.message);
          }
        }
      });
      
      function showDeliverables() {
        // Mock 数据（备用）
        deliverablesList.innerHTML = `
          <div class="deliverable">
            <h3>📄 产品需求文档_v1.md</h3>
            <p>类型：Markdown | 大小：24 KB</p>
            <p>提供者：ProductHero ⭐⭐⭐⭐⭐</p>
            <button onclick="alert('下载：产品需求文档_v1.md')">下载</button>
          </div>
        `;
        drawer.classList.add('open');
        overlay.classList.add('show');
      }
      
      function showRealDeliverables(items) {
        if (items.length === 0) {
          deliverablesList.innerHTML = `
            <div style="text-align: center; color: #888; padding: 40px 20px;">
              <p>暂无产物</p>
              <p style="font-size: 12px; margin-top: 10px;">任务可能还在执行中...</p>
            </div>
          `;
        } else {
          deliverablesList.innerHTML = items.map(item => `
            <div class="deliverable">
              <h3>📄 ${item.fileName || '未命名文件'}</h3>
              <p>类型：${(item.fileType || 'unknown').toUpperCase()} | 大小：${formatFileSize(item.sizeBytes || 0)}</p>
              <p>路径：${item.relativePath || item.id || '未知'}</p>
              ${item.downloadUrl ? `<button onclick="window.open('${item.downloadUrl}', '_blank')">下载</button>` : ''}
            </div>
          `).join('');
        }
        drawer.classList.add('open');
        overlay.classList.add('show');
      }
      
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        return (bytes / 1024 / 1024 / 1024).toFixed(1) + ' GB';
      }
      
      function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('show');
      }
    </script>
  </body>
</html>
