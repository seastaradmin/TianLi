<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天理 · 星空</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      #root { width: 100vw; height: 100vh; }
      .loading {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-size: 16px;
        z-index: 100;
      }
      .loading.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="loading" id="loading">正在加载星空...</div>
    <script type="module" src="/src/pages/SimpleStarrySky.tsx"></script>
  </body>
</html>
