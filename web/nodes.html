<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TianLi Harness - 实时节点监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 0.5; }
        100% { transform: scale(1.2); opacity: 0; }
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .node-running::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #10B981;
        animation: pulse-ring 2s infinite;
      }
      .node-running .dot {
        animation: pulse-dot 1.5s infinite;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
      <!-- 头部 -->
      <header class="mb-8">
        <h1 class="text-4xl font-bold mb-2 flex items-center gap-3">
          <span class="text-5xl">🏗️</span>
          TianLi Harness 节点监控
        </h1>
        <p class="text-gray-400">实时查看任务执行的节点状态</p>
      </header>

      <!-- 系统状态 -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-gray-800 rounded-xl p-4">
          <div class="text-gray-400 text-sm mb-2">系统状态</div>
          <div id="systemStatus" class="text-2xl font-bold">⏸️ 空闲</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4">
          <div class="text-gray-400 text-sm mb-2">总步数</div>
          <div id="totalSteps" class="text-2xl font-bold text-blue-400">0</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4">
          <div class="text-gray-400 text-sm mb-2">天劫触发</div>
          <div id="earlyExits" class="text-2xl font-bold text-red-400">0</div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4">
          <div class="text-gray-400 text-sm mb-2">L1 通过</div>
          <div id="l1Passes" class="text-2xl font-bold text-green-400">0</div>
        </div>
      </div>

      <!-- 节点流程图 -->
      <div class="bg-gray-800 rounded-xl p-8 mb-8">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
          <i data-lucide="workflow" class="w-6 h-6"></i>
          节点执行流程
        </h2>
        
        <div class="flex flex-wrap items-center justify-center gap-4">
          <!-- Fetch DNA -->
          <div id="node-fetch_dna" class="node-card relative">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 flex flex-col items-center justify-center border-4 border-gray-700 transition-all duration-300">
              <div class="dot w-3 h-3 bg-white rounded-full mb-2"></div>
              <i data-lucide="download" class="w-8 h-8 text-white mb-2"></i>
              <div class="text-xs text-white/80 text-center">Fetch DNA</div>
            </div>
            <div class="text-center mt-2 text-xs text-gray-400" id="time-fetch_dna">-</div>
          </div>

          <!-- Arrow -->
          <div class="text-gray-600">
            <i data-lucide="arrow-right" class="w-8 h-8"></i>
          </div>

          <!-- Agent Reason -->
          <div id="node-agent_reason" class="node-card relative">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-purple-600 to-purple-700 flex flex-col items-center justify-center border-4 border-gray-700 transition-all duration-300">
              <div class="dot w-3 h-3 bg-white rounded-full mb-2"></div>
              <i data-lucide="brain" class="w-8 h-8 text-white mb-2"></i>
              <div class="text-xs text-white/80 text-center">Agent Reason</div>
            </div>
            <div class="text-center mt-2 text-xs text-gray-400" id="time-agent_reason">-</div>
          </div>

          <!-- Arrow -->
          <div class="text-gray-600">
            <i data-lucide="arrow-right" class="w-8 h-8"></i>
          </div>

          <!-- TianJie L1 -->
          <div id="node-tianjie_l1" class="node-card relative">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-red-600 to-red-700 flex flex-col items-center justify-center border-4 border-gray-700 transition-all duration-300">
              <div class="dot w-3 h-3 bg-white rounded-full mb-2"></div>
              <i data-lucide="shield" class="w-8 h-8 text-white mb-2"></i>
              <div class="text-xs text-white/80 text-center">TianJie L1</div>
            </div>
            <div class="text-center mt-2 text-xs text-gray-400" id="time-tianjie_l1">-</div>
          </div>

          <!-- Arrow -->
          <div class="text-gray-600">
            <i data-lucide="arrow-right" class="w-8 h-8"></i>
          </div>

          <!-- TianJie L2 -->
          <div id="node-tianjie_l2" class="node-card relative">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-orange-600 to-orange-700 flex flex-col items-center justify-center border-4 border-gray-700 transition-all duration-300">
              <div class="dot w-3 h-3 bg-white rounded-full mb-2"></div>
              <i data-lucide="search" class="w-8 h-8 text-white mb-2"></i>
              <div class="text-xs text-white/80 text-center">TianJie L2</div>
            </div>
            <div class="text-center mt-2 text-xs text-gray-400" id="time-tianjie_l2">-</div>
          </div>

          <!-- Arrow -->
          <div class="text-gray-600">
            <i data-lucide="arrow-right" class="w-8 h-8"></i>
          </div>

          <!-- Execute -->
          <div id="node-execute" class="node-card relative">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-br from-green-600 to-green-700 flex flex-col items-center justify-center border-4 border-gray-700 transition-all duration-300">
              <div class="dot w-3 h-3 bg-white rounded-full mb-2"></div>
              <i data-lucide="zap" class="w-8 h-8 text-white mb-2"></i>
              <div class="text-xs text-white/80 text-center">Execute</div>
            </div>
            <div class="text-center mt-2 text-xs text-gray-400" id="time-execute">-</div>
          </div>
        </div>

        <!-- 图例 -->
        <div class="mt-8 flex flex-wrap justify-center gap-6 text-sm">
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 rounded bg-gray-700 border-2 border-gray-600"></div>
            <span class="text-gray-400">空闲</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 rounded bg-green-500 border-2 border-green-400 node-running"></div>
            <span class="text-green-400">运行中</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 rounded bg-green-700 border-2 border-green-600"></div>
            <span class="text-gray-400">已完成</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-4 h-4 rounded bg-red-700 border-2 border-red-600"></div>
            <span class="text-gray-400">失败</span>
          </div>
        </div>
      </div>

      <!-- 控制按钮 -->
      <div class="flex gap-4 mb-8">
        <button onclick="startTask()" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-bold transition flex items-center gap-2">
          <i data-lucide="play" class="w-5 h-5"></i>
          启动任务
        </button>
        <button onclick="stopTask()" class="bg-yellow-600 hover:bg-yellow-700 px-6 py-3 rounded-lg font-bold transition flex items-center gap-2">
          <i data-lucide="square" class="w-5 h-5"></i>
          停止任务
        </button>
        <button onclick="resetNodes()" class="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-lg font-bold transition flex items-center gap-2">
          <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
          重置状态
        </button>
      </div>

      <!-- 实时日志 -->
      <div class="bg-gray-800 rounded-xl p-6">
        <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
          <i data-lucide="terminal" class="w-6 h-6"></i>
          实时日志
        </h2>
        <div id="logContainer" class="h-96 overflow-y-auto bg-gray-950 rounded-lg p-4 font-mono text-sm">
          <div class="text-gray-500 text-center py-8">等待任务启动...</div>
        </div>
      </div>
    </div>

    <script>
      let eventSource = null;

      // 启动事件流
      function connectSSE() {
        eventSource = new EventSource('/api/logs');
        
        eventSource.addEventListener('log', (event) => {
          const log = JSON.parse(event.data);
          addLog(log);
          updateStats();
        });
        
        eventSource.addEventListener('stats', (event) => {
          const stats = JSON.parse(event.data);
          updateStats(stats);
          updateNodes(stats.nodeStatus);
        });
        
        eventSource.onerror = () => {
          console.error('SSE 连接错误');
        };
      }

      // 添加日志
      function addLog(log) {
        const container = document.getElementById('logContainer');
        if (container.querySelector('.text-gray-500')) {
          container.innerHTML = '';
        }
        
        const logDiv = document.createElement('div');
        logDiv.className = 'flex gap-2 mb-1';
        logDiv.innerHTML = `
          <span class="text-gray-500 w-16">${log.time}</span>
          <span class="${getLevelColor(log.level)} px-2 rounded text-xs">${log.level}</span>
          <span class="text-purple-400 w-24">${log.module}</span>
          <span class="text-gray-300">${log.msg}</span>
        `;
        container.appendChild(logDiv);
        container.scrollTop = container.scrollHeight;
      }

      // 更新统计
      function updateStats(stats) {
        if (!stats) return;
        
        document.getElementById('totalSteps').textContent = stats.totalSteps || 0;
        document.getElementById('earlyExits').textContent = stats.earlyExits || 0;
        document.getElementById('l1Passes').textContent = stats.l1Passes || 0;
        
        const statusMap = {
          'idle': '⏸️ 空闲',
          'running': '🔄 运行中',
          'completed': '✅ 完成',
          'error': '❌ 错误'
        };
        document.getElementById('systemStatus').textContent = statusMap[stats.status] || '⏸️ 空闲';
      }

      // 更新节点状态
      function updateNodes(nodeStatus) {
        if (!nodeStatus) return;
        
        for (const [nodeId, node] of Object.entries(nodeStatus)) {
          const card = document.getElementById(`node-${nodeId}`);
          const timeDiv = document.getElementById(`time-${nodeId}`);
          const innerDiv = card.querySelector('div:first-child');
          
          // 重置所有状态
          innerDiv.classList.remove('node-running');
          innerDiv.style.borderColor = '#374151';
          
          // 根据状态设置样式
          if (node.status === 'running') {
            innerDiv.classList.add('node-running');
            innerDiv.style.borderColor = '#10B981';
          } else if (node.status === 'completed') {
            innerDiv.style.borderColor = '#059669';
          } else if (node.status === 'failed') {
            innerDiv.style.borderColor = '#DC2626';
          }
          
          // 更新时间
          if (node.last_run) {
            timeDiv.textContent = node.last_run;
          }
        }
      }

      // 重置节点
      function resetNodes() {
        for (const nodeId of ['fetch_dna', 'agent_reason', 'tianjie_l1', 'tianjie_l2', 'execute']) {
          const card = document.getElementById(`node-${nodeId}`);
          const innerDiv = card.querySelector('div:first-child');
          const timeDiv = document.getElementById(`time-${nodeId}`);
          
          innerDiv.classList.remove('node-running');
          innerDiv.style.borderColor = '#374151';
          timeDiv.textContent = '-';
        }
        
        document.getElementById('totalSteps').textContent = '0';
        document.getElementById('earlyExits').textContent = '0';
        document.getElementById('l1Passes').textContent = '0';
        document.getElementById('systemStatus').textContent = '⏸️ 空闲';
        document.getElementById('logContainer').innerHTML = '<div class="text-gray-500 text-center py-8">等待任务启动...</div>';
      }

      // 启动任务
      function startTask() {
        fetch('/api/run/start', { method: 'POST' })
          .then(r => r.json())
          .then(d => console.log('启动:', d));
      }

      // 停止任务
      function stopTask() {
        fetch('/api/run/stop', { method: 'POST' })
          .then(r => r.json())
          .then(d => console.log('停止:', d));
      }

      // 获取日志级别颜色
      function getLevelColor(level) {
        const colors = {
          'INFO': 'text-blue-400 bg-blue-900/30',
          'DEBUG': 'text-gray-400 bg-gray-800/30',
          'WARN': 'text-yellow-400 bg-yellow-900/30',
          'ERROR': 'text-red-400 bg-red-900/30'
        };
        return colors[level] || colors.INFO;
      }

      // 页面加载时连接 SSE
      connectSSE();
      lucide.createIcons();
    </script>
  </body>
</html>
